<div class="container">
  <h1>Enterprise Task Manager</h1>

  <div *ngIf="!(authService.isLoggedIn$ | async); else taskPanel">
    <div *ngIf="!showRegister">
      <h2>Iniciar Sesión</h2>
      <div class="auth-form">
        <input type="email" [(ngModel)]="loginEmail" name="loginEmail" placeholder="Email" autocomplete="email" />
        <input type="password" [(ngModel)]="loginPassword" name="loginPassword" placeholder="Contraseña" autocomplete="current-password" />
        <div class="auth-actions">
          <button class="btn btn-primary" (click)="login()">Entrar</button>
          <button class="btn btn-link" (click)="showRegister = true; errorMessage = ''">Crear cuenta</button>
        </div>
      </div>
    </div>

    <div *ngIf="showRegister">
      <h2>Registro</h2>
      <div class="auth-form">
        <input type="email" [(ngModel)]="registerEmail" name="registerEmail" placeholder="Email" autocomplete="email" />
        <input type="password" [(ngModel)]="registerPassword" name="registerPassword" placeholder="Contraseña (mín. 6)" autocomplete="new-password" />
        <div class="auth-actions">
          <button class="btn btn-primary" (click)="register()">Registrarse</button>
          <button class="btn btn-link" (click)="showRegister = false; errorMessage = ''">Ya tengo cuenta</button>
        </div>
      </div>
    </div>

    <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
  </div>

  <ng-template #taskPanel>
    <div class="header-row">
      <span class="user-email">{{ userEmail }}</span>
      <button class="btn btn-logout" (click)="logout()">Cerrar sesión</button>
    </div>

    <!-- Category filter -->
    <div class="category-filter" *ngIf="categories.length > 0">
      <span class="filter-label">Filtrar:</span>
      <span
        class="category-tag"
        [class.active]="filterCategoryId === null"
        (click)="filterCategoryId = null; loadTasks()"
      >Todas</span>
      <span
        *ngFor="let cat of categories"
        class="category-tag"
        [style.borderColor]="cat.color"
        [style.color]="filterCategoryId === cat.id ? '#fff' : cat.color"
        [style.background]="filterCategoryId === cat.id ? cat.color : 'transparent'"
        [class.active]="filterCategoryId === cat.id"
        (click)="filterCategoryId = cat.id; loadTasks()"
      >{{ cat.nombre }}</span>
    </div>

    <!-- Create task form -->
    <form class="form-group" (ngSubmit)="createTask()">
      <input type="text" [(ngModel)]="newTitle" name="titulo" placeholder="Título de la tarea" required />
      <input type="text" [(ngModel)]="newDescription" name="descripcion" placeholder="Descripción (opcional)" />
      <button type="submit" class="btn btn-primary">Añadir Tarea</button>
    </form>

    <!-- Category selector for new task -->
    <div class="category-picker" *ngIf="categories.length > 0">
      <span class="filter-label">Categorías:</span>
      <span
        *ngFor="let cat of categories"
        class="category-tag"
        [style.borderColor]="cat.color"
        [style.color]="selectedCategoryIds.includes(cat.id) ? '#fff' : cat.color"
        [style.background]="selectedCategoryIds.includes(cat.id) ? cat.color : 'transparent'"
        [class.active]="selectedCategoryIds.includes(cat.id)"
        (click)="toggleCategory(cat.id)"
      >{{ cat.nombre }}</span>
    </div>

    <div *ngIf="loading" class="empty-state">Cargando tareas...</div>

    <ul class="task-list" *ngIf="!loading">
      <li *ngFor="let task of tasks" class="task-item" [class.completed]="task.completada">
        <div class="task-info">
          <div class="task-title">{{ task.titulo }}</div>
          <div class="task-desc" *ngIf="task.descripcion">{{ task.descripcion }}</div>
          <div class="task-categories" *ngIf="task.categories.length > 0">
            <span *ngFor="let cat of task.categories" class="category-badge" [style.background]="cat.color">
              {{ cat.nombre }}
            </span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-toggle" (click)="toggleTask(task)">
            {{ task.completada ? 'Reactivar' : 'Completar' }}
          </button>
          <button class="btn btn-danger" (click)="deleteTask(task)">Eliminar</button>
        </div>
      </li>
    </ul>

    <div *ngIf="!loading && tasks.length === 0" class="empty-state">
      No hay tareas. ¡Crea una nueva!
    </div>
  </ng-template>
</div>
